services:
  - type: web
    name: zarzis-irrigation-1
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn modbus_proxy_cloud:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 0
    disk:
      name: zarzis-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      # === Mode & WebSocket ===
      - key: EDGE_MODE
        value: http_push
      - key: EDGE_HOST
        value: ""
      - key: EDGE_PORT
        value: "502"
      - key: EDGE_PUSH_STALE_SEC
        value: "10"
      - key: EDGE_AGENT_STALE_SEC
        value: "20"
      - key: EDGE_WS_ENABLED
        value: "true"
      - key: EDGE_WS_HEARTBEAT_SEC
        value: "5"
      - key: EDGE_WS_COMMAND_PUSH_SEC
        value: "0.25"
      - key: EDGE_WS_RECEIVE_TIMEOUT_SEC
        value: "0.25"
      - key: EDGE_COMMAND_TTL_SEC
        value: "300"
      - key: EDGE_ACK_TIMEOUT_SEC
        value: "5"
      - key: EDGE_ALLOW_START
        value: "true"

      # === Commandes & sécurités ===
      - key: SERVER_SAFETY_ENABLED
        value: "false"
      - key: COMMAND_MIN_INTERVAL_SEC
        value: "0"
      - key: COMMAND_RESTART_DELAY_SEC
        value: "0"
      - key: MODBUS_REGISTERS_VALIDATED
        value: "true"
      - key: ALLOW_PARAM_WRITE
        value: "false"
      - key: ALLOW_REMOTE_CONNECT
        value: "false"

      # === Équipements activés ===
      - key: SALMSON_COMMAND_ENABLED
        value: "true"
      - key: WILO_COMMAND_ENABLED
        value: "true"
      - key: INVT_COMMAND_ENABLED
        value: "true"
      - key: RELAY_ENABLED
        value: "true"
      - key: RELAY_ACTIVE_LOW
        value: "true"
      - key: RELAY_MAX_DURATION_MIN
        value: "9999"
      - key: RELAY_MIN_INTERVAL_SEC
        value: "5"

      # === Zones relais GPIO ===
      - key: RELAY_ZONE_1_PIN
        value: "17"
      - key: RELAY_ZONE_2_PIN
        value: "27"
      - key: RELAY_ZONE_3_PIN
        value: "22"
      - key: RELAY_ZONE_4_PIN
        value: "23"
      - key: RELAY_ZONE_5_PIN
        value: "24"
      - key: RELAY_ZONE_6_PIN
        value: "25"
      - key: RELAY_ZONE_7_PIN
        value: "5"
      - key: RELAY_ZONE_8_PIN
        value: "6"

      # === Adresses Modbus ===
      - key: ADDR_INVT
        value: "1"
      - key: ADDR_SALMSON
        value: "2"
      - key: ADDR_WILO
        value: "3"
      - key: ADDR_COFFRET4
        value: "4"

      # === Registres INVT GD100-PV (validés terrain 14/05/2026) ===
      - key: INVT_CMD_REG
        value: "0x1000"
      - key: INVT_ON_VALUE
        value: "1"
      - key: INVT_OFF_VALUE
        value: "0"
      - key: INVT_NOMINAL_KW
        value: "5.5"
      - key: INVT_REG_FREQ_HZ
        value: "0x3000"
      - key: INVT_REG_SET_FREQ_HZ
        value: "0x3001"
      - key: INVT_REG_DC_BUS_V
        value: "0x3002"
      - key: INVT_REG_VOLTAGE_V
        value: "0x3003"
      - key: INVT_REG_CURRENT_A
        value: "0x3004"
      - key: INVT_REG_POWER_W
        value: "0x3005"
      - key: INVT_REG_POWER_PCT
        value: "0x3006"
      - key: INVT_REG_TEMP_C
        value: "0x3007"
      - key: INVT_REG_FAULT_CODE
        value: "0x5000"

      # === Registres Salmson EC-L (validés terrain 14/05/2026) ===
      - key: SALMSON_FLOAT_LOW_OK_VALUE
        value: "0"
      - key: SALMSON_CMD_REG
        value: "14"
      - key: SALMSON_REG_LEVEL_CM
        value: "24"
      - key: SALMSON_REG_PUMP1_MODE
        value: "40"
      - key: SALMSON_REG_SWITCH_STATE
        value: "61"
      - key: SALMSON_REG_ERROR_CODE
        value: "138"
      - key: SALMSON_REG_FLOAT_STATE
        value: "197"

      # === Registres Wilo W-CTRL-EC-B (validés terrain 14/05/2026) ===
      - key: WILO_CMD_REG
        value: "14"
      - key: WILO_REG_PRESSURE
        value: "25"
      - key: WILO_REG_FLOW
        value: "-1"
      - key: WILO_REG_PUMP1_MODE
        value: "40"
      - key: WILO_REG_PUMP2_MODE
        value: "41"
      - key: WILO_REG_SWITCH_STATE
        value: "61"
      - key: WILO_REG_ERROR_CODE
        value: "138"
      - key: WILO_ACK_REG
        value: "140"

      # === Système ===
      - key: UPDATE_SEC
        value: "2"
      - key: PLANNING_POLL_SEC
        value: "5"
      - key: ENABLE_PLANNING
        value: "false"
      - key: PERSISTENT_STORAGE_ENABLED
        value: "true"
      - key: DATA_DIR
        value: /var/data
      - key: LOCAL_TZ
        value: Africa/Tunis
      - key: CORS_ORIGINS
        value: "https://zarzis-irrigation-1.onrender.com"
      - key: HISTORY_MAX_ITEMS
        value: "2000"
      - key: HISTORY_SAVE_MIN_INTERVAL_SEC
        value: "30"

      # === Authentification ===
      - key: API_TOKEN
        generateValue: true
      - key: APP_LOGIN_ENABLED
        value: "true"
      - key: APP_LOGIN_EMAIL
        value: mohamedbsir@live.fr
      - key: APP_LOGIN_PASSWORD_HASH
        value: "pbkdf2_sha256$260000$HPLRvA2gpozBXgJGnqVgiQ$WpOCM3cpTPkNwumc7SdMZ51VSdIFNcTwEvsmuy4Nph8"
      - key: APP_LOGIN_SESSION_SECRET
        generateValue: true
      - key: APP_LOGIN_SESSION_TTL_HOURS
        value: "12"
      - key: APP_LOGIN_REMEMBER_TTL_DAYS
        value: "30"

      # === Notifications Telegram (optionnel) ===
      - key: TELEGRAM_BOT_TOKEN
        value: ""
      - key: TELEGRAM_CHAT_ID
        value: ""
      - key: TELEGRAM_NOTIFY_LEVELS
        value: "error,warning"
