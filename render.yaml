services:
  - type: web
    name: zarzis-irrigation-1
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn modbus_proxy_cloud:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    # Quand tu passes au stockage Render payant, ajoute un disque persistant ici :
    # disk:
    #   name: zarzis-data
    #   mountPath: /var/data
    #   sizeGB: 1
    # Puis mets DATA_DIR=/var/data et PERSISTENT_STORAGE_ENABLED=true.
    envVars:
      - key: EDGE_MODE
        value: http_push
      - key: EDGE_HOST
        value: ""
      - key: EDGE_PORT
        value: "502"
      - key: EDGE_PUSH_STALE_SEC
        value: "45"
      - key: EDGE_COMMAND_TTL_SEC
        value: "300"
      - key: EDGE_ACK_TIMEOUT_SEC
        value: "45"
      - key: HISTORY_MAX_ITEMS
        value: "2000"
      - key: HISTORY_SAVE_MIN_INTERVAL_SEC
        value: "30"
      - key: UPDATE_SEC
        value: "5"
      - key: PLANNING_POLL_SEC
        value: "10"
      - key: ENABLE_PLANNING
        value: "false"
      - key: PERSISTENT_STORAGE_ENABLED
        value: "false"
      - key: LOCAL_TZ
        value: Africa/Tunis
      - key: CORS_ORIGINS
        value: "https://zarzis-irrigation-1.onrender.com"
      - key: SERVER_SAFETY_ENABLED
        value: "true"
      - key: ALLOW_PARAM_WRITE
        value: "false"
      - key: MODBUS_REGISTERS_VALIDATED
        value: "true"
      - key: COMMAND_MIN_INTERVAL_SEC
        value: "30"
      - key: COMMAND_RESTART_DELAY_SEC
        value: "60"
      - key: ALLOW_REMOTE_CONNECT
        value: "false"
      - key: INVT_CMD_REG
        value: "0x2000"
      - key: INVT_ON_VALUE
        value: "1"
      - key: INVT_OFF_VALUE
        value: "5"
      - key: INVT_NOMINAL_KW
        value: "5.5"
      - key: INVT_REG_FREQ_HZ
        value: "0x3000"
      - key: INVT_REG_SET_FREQ_HZ
        value: "0x3001"
      - key: INVT_REG_DC_BUS_V
        value: "0x3002"
      - key: INVT_REG_VOLTAGE_V
        value: "0x3003"
      - key: INVT_REG_CURRENT_A
        value: "0x3004"
      - key: INVT_REG_POWER_PCT
        value: "0x3006"
      - key: INVT_REG_FAULT_CODE
        value: "0x5000"
      - key: SALMSON_FLOAT_LOW_OK_VALUE
        value: "1"
      - key: SALMSON_COMMAND_ENABLED
        value: "true"
      - key: SALMSON_CMD_REG
        value: "14"
      - key: SALMSON_REG_LEVEL_CM
        value: "25"
      - key: SALMSON_REG_PUMP1_MODE
        value: "40"
      - key: SALMSON_REG_PUMP2_MODE
        value: "41"
      - key: SALMSON_REG_SWITCH_STATE
        value: "61"
      - key: SALMSON_REG_ERROR_CODE
        value: "138"
      - key: SALMSON_REG_FLOAT_STATE
        value: "197"
      - key: WILO_CMD_REG
        value: "14"
      - key: WILO_REG_PRESSURE
        value: "25"
      - key: WILO_REG_FLOW
        value: "-1"
      - key: WILO_REG_PUMP1_MODE
        value: "40"
      - key: WILO_REG_PUMP2_MODE
        value: "41"
      - key: WILO_REG_SWITCH_STATE
        value: "61"
      - key: WILO_REG_ERROR_CODE
        value: "138"
      - key: WILO_ACK_REG
        value: "140"
      - key: MODBUS_BAUDRATE
        value: "9600"
      - key: MODBUS_SERIAL
        value: "8N1"
      - key: ADDR_INVT
        value: "1"
      - key: ADDR_SALMSON
        value: "2"
      - key: ADDR_WILO
        value: "3"
      - key: ADDR_COFFRET4
        value: "4"
      - key: RELAY_ENABLED
        value: "true"
      - key: RELAY_ACTIVE_LOW
        value: "true"
      - key: RELAY_MAX_DURATION_MIN
        value: "120"
      - key: RELAY_MIN_INTERVAL_SEC
        value: "10"
      - key: RELAY_ZONE_1_PIN
        value: "17"
      - key: RELAY_ZONE_2_PIN
        value: "27"
      - key: RELAY_ZONE_3_PIN
        value: "22"
      - key: RELAY_ZONE_4_PIN
        value: "23"
      - key: RELAY_ZONE_5_PIN
        value: "24"
      - key: RELAY_ZONE_6_PIN
        value: "25"
      - key: TELEGRAM_BOT_TOKEN
        value: ""
      - key: TELEGRAM_CHAT_ID
        value: ""
      - key: TELEGRAM_NOTIFY_LEVELS
        value: "error,warning"
      - key: API_TOKEN
        generateValue: true
