services:
  - type: web
    name: zarzis-irrigation-1
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn modbus_proxy_cloud:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: G781_MODE
        value: direct_tcp
      - key: G781_HOST
        value: ""
      - key: G781_PORT
        value: "502"
      - key: MODBUS_BAUDRATE
        value: "9600"
      - key: MODBUS_SERIAL
        value: "8N1"
      - key: API_TOKEN
        generateValue: true
